<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">SyncPad app preview</title>
  <desc id="desc">A dark SyncPad note editor with a shared pad open, three people online, and a live note being edited.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="page" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#030712"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="760" fill="#030712"/>
  <rect x="70" y="42" width="1140" height="676" rx="18" fill="#0b1120" filter="url(#shadow)"/>

  <rect x="70" y="42" width="1140" height="48" rx="18" fill="#111827"/>
  <path d="M70 72h1140v18H70z" fill="#111827"/>
  <circle cx="100" cy="66" r="6" fill="#ef4444"/>
  <circle cx="122" cy="66" r="6" fill="#f59e0b"/>
  <circle cx="144" cy="66" r="6" fill="#22c55e"/>
  <rect x="184" y="55" width="520" height="22" rx="11" fill="#030712" stroke="#374151"/>
  <text x="204" y="70" fill="#9ca3af" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">syncpad.app/notes/project-kickoff</text>

  <rect x="70" y="90" width="1140" height="628" fill="url(#page)"/>

  <rect x="70" y="90" width="1140" height="74" fill="#1f2937"/>
  <line x1="70" y1="164" x2="1210" y2="164" stroke="#374151"/>

  <g transform="translate(192 113)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <g fill="none" stroke="#d1d5db" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 7 6 15l8 8"/>
      <path d="M7 15h25"/>
    </g>
    <text x="44" y="20" fill="#d1d5db" font-size="15" font-weight="600">Back</text>
    <text x="116" y="20" fill="#67e8f9" font-size="15" font-weight="700">SyncPad</text>
    <text x="195" y="20" fill="#d1d5db" font-size="14" font-weight="600">You are:</text>
    <text x="262" y="20" fill="#f9fafb" font-size="14">Ari</text>
    <line x1="260" y1="28" x2="344" y2="28" stroke="#6b7280"/>

    <g transform="translate(638 1)">
      <circle cx="10" cy="8" r="4" fill="none" stroke="#9ca3af" stroke-width="1.8"/>
      <path d="M3 22c1.3-6 12.7-6 14 0" fill="none" stroke="#9ca3af" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="23" cy="9" r="3.5" fill="none" stroke="#9ca3af" stroke-width="1.6"/>
      <path d="M18 22c1.1-4.8 10.2-4.8 11.3 0" fill="none" stroke="#9ca3af" stroke-width="1.6" stroke-linecap="round"/>
      <text x="40" y="19" fill="#9ca3af" font-size="14">3 people online</text>
    </g>

    <g transform="translate(800 -5)">
      <rect width="96" height="34" rx="6" fill="#06b6d4"/>
      <rect x="18" y="9" width="11" height="13" rx="2" fill="none" stroke="#111827" stroke-width="1.8"/>
      <rect x="24" y="13" width="11" height="13" rx="2" fill="none" stroke="#111827" stroke-width="1.8"/>
      <text x="44" y="22" fill="#111827" font-size="14" font-weight="700">Share</text>
    </g>
  </g>

  <g transform="translate(192 205)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="0" y="0" fill="#ffffff" font-size="32" font-weight="800">Project Kickoff Notes</text>

    <rect x="0" y="38" width="896" height="386" rx="8" fill="#1f2937" stroke="#374151"/>
    <text x="28" y="82" fill="#f9fafb" font-size="18" font-weight="700">Meeting notes</text>
    <text x="28" y="126" fill="#e5e7eb" font-size="17">- Confirm the launch checklist before Friday</text>
    <text x="28" y="166" fill="#e5e7eb" font-size="17">- Share this pad with design and backend leads</text>
    <text x="28" y="206" fill="#e5e7eb" font-size="17">- Keep decisions and blockers visible while the team edits together</text>
    <text x="28" y="276" fill="#d1d5db" font-size="17">Ari: Adding the README preview today.</text>
    <text x="28" y="316" fill="#d1d5db" font-size="17">Sam: I will verify the production deploy config next.</text>
    <rect x="456" y="296" width="2" height="26" rx="1" fill="#67e8f9"/>

    <g transform="translate(697 342)">
      <circle cx="22" cy="22" r="22" fill="#06b6d4"/>
      <text x="22" y="28" text-anchor="middle" fill="#0f172a" font-size="15" font-weight="800">A</text>
      <circle cx="58" cy="22" r="22" fill="#a7f3d0"/>
      <text x="58" y="28" text-anchor="middle" fill="#064e3b" font-size="15" font-weight="800">S</text>
      <circle cx="94" cy="22" r="22" fill="#fde68a"/>
      <text x="94" y="28" text-anchor="middle" fill="#78350f" font-size="15" font-weight="800">M</text>
    </g>

    <text x="0" y="462" fill="#9ca3af" font-size="14">Last saved at 10:42 AM</text>
  </g>
</svg>
